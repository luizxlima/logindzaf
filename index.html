<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
}

/* LEFT PANEL */
.left {
  width: 420px;
  padding: 60px 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #f5f5f5;
}

/* TOP CONTENT */
.content {
  width: 100%;
}

.logo {
  width: 60px;
  margin-bottom: 30px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 25px;
}

/* LABEL */
.label {
  font-size: 13px;
  margin-bottom: 5px;
  display: block;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  margin-top: 12px;
  font-size: 14px;
  cursor: pointer;
}

/* PRIMARY */
.primary {
  background: #3b5cff;
  color: white;
  font-weight: 600;
}

/* GOOGLE */
.google {
  background: white;
  border: 1px solid #ccc;
}

/* DIVIDER */
.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  color: #999;
  font-size: 13px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #ddd;
}

.divider span {
  margin: 0 10px;
}

/* CODE */
.code-container {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  cursor: text;
}

.code-box {
  width: 42px;
  height: 52px;
  border: 1px solid #ccc;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
  background: #fff;
}

.code-box.active {
  border-color: #3b5cff;
  box-shadow: 0 0 0 2px rgba(59,92,255,0.2);
}

#code-hidden {
  position: absolute;
  opacity: 0;
}

/* FOOTER */
.footer {
  font-size: 12px;
  color: #777;
}

.footer a {
  color: #3b5cff;
  text-decoration: none;
}

.footer .signup {
  margin-bottom: 20px;
}

.footer .powered {
  margin-bottom: 10px;
}

/* RIGHT IMAGE */
.right {
  flex: 1;
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('/bg.png') center/cover no-repeat;
}

/* 🔥 MOBILE CORRETO (HOTMART STYLE) */
@media (max-width: 900px) {
  body {
    display: block;
    background: #f5f5f5;
  }

  .right {
    display: none;
  }

  .left {
    width: 100%;
    min-height: 100vh;
    padding: 30px 20px;

    display: flex;
    flex-direction: column;
    justify-content: center;

    background: #f5f5f5;
  }

  .content {
    max-width: 380px;
    width: 100%;
    margin: 0 auto;
  }

  .logo {
    display: block;
    margin: 0 auto 20px auto;
    width: 70px;
  }

  h1 {
    font-size: 24px;
    text-align: left;
  }

  .subtitle {
    text-align: left;
    margin-bottom: 20px;
  }

  input {
    padding: 14px;
    font-size: 16px;
  }

  button {
    padding: 14px;
    font-size: 16px;
  }

  .footer {
    display: none;
  }
}
</style>
</head>

<body>

<div class="left">

  <div class="content">
    <img src="/logo.png" class="logo">

    <h1>Conecte-se</h1>
    <div class="subtitle">Escolha como deseja acessar sua conta.</div>

    <!-- STEP EMAIL -->
    <div id="step-email">
      <label class="label">E-mail</label>
      <input type="email" id="email" placeholder="Insira seu endereço de e-mail">

      <button class="primary" onclick="sendCode()">Conecte-se</button>

      <div class="divider"><span>ou</span></div>

      <button class="google" onclick="loginGoogle()">Entrar com o Google</button>
    </div>

    <!-- STEP CODE -->
    <div id="step-code" style="display:none;">
      <p id="emailText"></p>

      <label class="label">Código</label>

      <div class="code-container" onclick="focusHiddenInput()">
        <input id="code-hidden" maxlength="6" oninput="handleCodeInput()">
        <div class="code-box" id="box0"></div>
        <div class="code-box" id="box1"></div>
        <div class="code-box" id="box2"></div>
        <div class="code-box" id="box3"></div>
        <div class="code-box" id="box4"></div>
        <div class="code-box" id="box5"></div>
      </div>

      <button class="primary" onclick="verifyCode()">Confirmar</button>
      <button id="resendBtn" disabled>Reenviar código (30s)</button>

      <div class="divider"><span>ou</span></div>

      <button class="google">Faça login com a senha</button>
    </div>

    <p id="msg"></p>
  </div>

  <div class="footer">
    <div class="signup">
      Não tem uma conta? <a href="#">Inscrever-se</a>
    </div>

    <div class="powered">
      Distribuído por <strong>hotmart</strong>
    </div>

    <div>
      Apoiar — Termos de Uso — política de Privacidade
    </div>
  </div>

</div>

<div class="right"></div>

<script>
// (SEU JS ORIGINAL — NÃO ALTEREI)
</script>

</body>
</html>
