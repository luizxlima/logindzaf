<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* LADO ESQUERDO */
.left {
  width: 400px;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.left img.logo {
  width: 60px;
  margin-bottom: 20px;
}

h2 {
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #3b5cff;
  color: white;
}

.google {
  background: white;
  border: 1px solid #ccc;
}

.divider {
  text-align: center;
  margin: 15px 0;
}

/* LADO DIREITO */
.right {
  flex: 1;
  background: url('/images/bg.png') center/cover;
}

/* RESPONSIVO */
@media (max-width: 900px) {
  .right {
    display: none;
  }
  .left {
    width: 100%;
  }
}
</style>

</head>

<body>

<div class="left">
  <img class="logo" src="/images/logo.png" />

  <h2>Log in</h2>
  <p>Choose how you want to log into your account</p>

  <input type="email" id="email" placeholder="Enter your email address" />
  <button class="primary" onclick="sendCode()">Log in</button>

  <div class="divider">or</div>

<button class="google" onclick="loginGoogle()">Enter with Google</button>

  <input type="text" id="code" placeholder="Enter code" />
  <button onclick="verifyCode()">Confirm code</button>

  <p id="msg"></p>
</div>

<div class="right"></div>

<script>
const domain = "https://sso.dozeroafluencia.com";
const client_id = "2qjWADjQ2sCid8z9QY2oM1QgUvX3nBz6";

async function sendCode() {
  const email = document.getElementById("email").value;

  await fetch(domain + "/passwordless/start", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      client_id: client_id,
      connection: "email",
      email: email,
      send: "code"
    })
  });

  document.getElementById("msg").innerText = "Código enviado!";
}

async function verifyCode() {
  const email = document.getElementById("email").value;
  const code = document.getElementById("code").value;

  const res = await fetch(domain + "/oauth/token", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      grant_type: "http://auth0.com/oauth/grant-type/passwordless/otp",
      client_id: client_id,
      username: email,
      otp: code,
      realm: "email"
    })
  });

  const data = await res.json();

  if (data.access_token) {
    window.location.href = "https://membros.dozeroafluencia.com/";
  } else {
    document.getElementById("msg").innerText = "Código inválido!";
  }
}

function loginGoogle() {
  window.location.href =
    domain + "/authorize?response_type=code" +
    "&client_id=" + client_id +
    "&connection=google-oauth2" +
    "&redirect_uri=https://login.dozeroafluencia.com";
}
</script>

</body>
</html>
