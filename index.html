<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ================= DESKTOP ================= */
.desktop {
  display: flex;
  height: 100vh;
}

.left {
  width: 420px;
  padding: 60px 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #f5f5f5;
}

.content {
  max-width: 320px;
}

.logo {
  width: 60px;
  margin-bottom: 30px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 25px;
}

.label {
  font-size: 13px;
  margin-bottom: 5px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  margin-top: 12px;
  cursor: pointer;
}

.primary {
  background: #3b5cff;
  color: white;
}

.google {
  background: white;
  border: 1px solid #ccc;
}

.divider {
  text-align: center;
  margin: 20px 0;
  color: #999;
}

.right {
  flex: 1;
  background: url('/bg.png') center/cover no-repeat;
}

/* ================= MOBILE ================= */
.mobile {
  display: none;
  min-height: 100vh;
  background: #f5f5f5;
  padding: 30px 20px;
}

.mobile .container {
  max-width: 400px;
  margin: 0 auto;
}

.mobile .logo {
  display: block;
  margin: 40px auto 20px;
  width: 70px;
}

.mobile h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

.mobile .subtitle {
  margin-bottom: 20px;
}

.mobile input,
.mobile button {
  padding: 16px;
  font-size: 16px;
}

/* CODE BOX */
.code-container {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.code-box {
  width: 42px;
  height: 52px;
  border: 1px solid #ccc;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
}

.code-box.active {
  border-color: #3b5cff;
}

#code-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  opacity: 0;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 900px) {
  .desktop { display: none; }
  .mobile { display: block; }
}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="desktop">
  <div class="left">
    <div class="content">

      <img src="/logo.png" class="logo">

      <h1>Entrar</h1>
      <div class="subtitle">Escolha como deseja entrar na sua conta</div>

      <div id="step-email-desktop">
        <label class="label">Email</label>
        <input id="email-desktop" placeholder="Digite seu email">
        <button class="primary" onclick="sendCode('desktop')">Entrar</button>

        <div class="divider">ou</div>

        <button class="google" onclick="loginGoogle()">Entrar com Google</button>
      </div>

      <div id="step-code-desktop" style="display:none;">
        <p id="emailText-desktop"></p>

        <div class="code-container" onclick="focusInput('desktop')">
          <input id="code-desktop" maxlength="6" oninput="handleCode('desktop')">
          <div class="code-box" id="d0"></div>
          <div class="code-box" id="d1"></div>
          <div class="code-box" id="d2"></div>
          <div class="code-box" id="d3"></div>
          <div class="code-box" id="d4"></div>
          <div class="code-box" id="d5"></div>
        </div>

        <button onclick="verifyCode('desktop')">Confirmar</button>
      </div>

    </div>
  </div>

  <div class="right"></div>
</div>

<!-- MOBILE -->
<div class="mobile">
  <div class="container">

    <img src="/logo.png" class="logo">

    <h1>Entrar</h1>
    <div class="subtitle">Escolha como deseja entrar na sua conta</div>

    <div id="step-email-mobile">
      <label>Email</label>
      <input id="email-mobile" placeholder="Digite seu email">

      <button class="primary" onclick="sendCode('mobile')">Entrar</button>

      <div class="divider">ou</div>

      <button class="google" onclick="loginGoogle()">Entrar com Google</button>
    </div>

    <div id="step-code-mobile" style="display:none;">
      <p id="emailText-mobile"></p>

      <div class="code-container" onclick="focusInput('mobile')">
        <input id="code-mobile" maxlength="6" oninput="handleCode('mobile')">
        <div class="code-box" id="m0"></div>
        <div class="code-box" id="m1"></div>
        <div class="code-box" id="m2"></div>
        <div class="code-box" id="m3"></div>
        <div class="code-box" id="m4"></div>
        <div class="code-box" id="m5"></div>
      </div>

      <button onclick="verifyCode('mobile')">Confirmar</button>
    </div>

  </div>
</div>

<script>
const TEST_MODE = true;

function sendCode(type) {
  const email = document.getElementById(`email-${type}`).value;

  if (!email) return alert("Digite um email");

  document.getElementById(`step-email-${type}`).style.display = "none";
  document.getElementById(`step-code-${type}`).style.display = "block";

  document.getElementById(`emailText-${type}`).innerText =
    "Código enviado para " + email;
}

function focusInput(type) {
  document.getElementById(`code-${type}`).focus();
}

function handleCode(type) {
  const input = document.getElementById(`code-${type}`);
  let value = input.value.replace(/\D/g, "").slice(0, 6);
  input.value = value;

  for (let i = 0; i < 6; i++) {
    const box = document.getElementById((type === "mobile" ? "m" : "d") + i);
    box.innerText = value[i] || "";
    box.classList.remove("active");
  }

  if (value.length < 6) {
    document.getElementById((type === "mobile" ? "m" : "d") + value.length)
      .classList.add("active");
  }
}

function verifyCode(type) {
  const code = document.getElementById(`code-${type}`).value;

  if (code === "123456") {
    window.location.href = "https://membros.dozeroafluencia.com/";
  } else {
    alert("Use 123456");
  }
}

function loginGoogle() {
  window.location.href = "https://membros.dozeroafluencia.com/";
}
</script>

</body>
</html>
