<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* LADO ESQUERDO */
.left {
  width: 400px;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: white;
}

.logo {
  width: 60px;
  margin-bottom: 20px;
}

h2 {
  margin-bottom: 5px;
}

.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 8px;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 15px;
}

.primary {
  background: #3b5cff;
  color: white;
  font-weight: bold;
}

.google {
  background: white;
  border: 1px solid #ccc;
}

.divider {
  text-align: center;
  margin: 20px 0;
  color: #999;
}

/* 🔥 CODE BOXES */
.code-container {
  display: flex;
  gap: 10px;
  margin-top: 15px;
  justify-content: space-between;
  position: relative;
  cursor: text;
}

.code-box {
  width: 45px;
  height: 55px;
  border: 1px solid #ccc;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
  background: #fff;
  transition: all 0.2s;
}

.code-box.active {
  border-color: #3b5cff;
  box-shadow: 0 0 0 2px rgba(59,92,255,0.2);
}

#code-hidden {
  position: absolute;
  left: 0;
  top: 0;
  width: 1px;
  height: 1px;
  opacity: 0;
}

/* BACKGROUND */
.right {
  flex: 1;
  background: 
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('/bg.png') center center / cover no-repeat;
}

/* MOBILE */
@media (max-width: 900px) {
  body {
    flex-direction: column;
    background: #f5f5f5;
  }

  .right {
    display: none;
  }

  .left {
    width: 100%;
    min-height: 100vh;
    padding: 30px 20px;

    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .logo {
    margin: 0 auto 20px auto;
    display: block;
    width: 70px;
  }

  h2 {
    text-align: left;
  }

  .subtitle {
    text-align: left;
  }
}
</style>

</head>

<body>

<div class="left">
  <img class="logo" src="/logo.png" />

  <h2>Entrar</h2>
  <p class="subtitle">Escolha como deseja entrar na sua conta</p>

  <!-- STEP 1 -->
  <div id="step-email">
    <input type="email" id="email" placeholder="Digite seu email" />
    <button class="primary" onclick="sendCode()">Entrar</button>

    <div class="divider">ou</div>

    <button class="google" onclick="loginGoogle()">Entrar com Google</button>
  </div>

  <!-- STEP 2 -->
  <div id="step-code" style="display:none;">
    <p id="emailText"></p>

    <div class="code-container" onclick="focusHiddenInput()">
      <input type="text" id="code-hidden" maxlength="6" oninput="handleCodeInput()" />
      <div class="code-box" id="box0"></div>
      <div class="code-box" id="box1"></div>
      <div class="code-box" id="box2"></div>
      <div class="code-box" id="box3"></div>
      <div class="code-box" id="box4"></div>
      <div class="code-box" id="box5"></div>
    </div>

    <button class="primary" onclick="verifyCode()">Confirmar</button>
    <button id="resendBtn" disabled>Reenviar código (30s)</button>
  </div>

  <p id="msg"></p>
</div>

<div class="right"></div>

<script>
const domain = "https://sso.dozeroafluencia.com";
const client_id = "2qjWADjQ2sCid8z9QY2oM1QgUvX3nBz6";

const TEST_MODE = true;

let countdown = 30;
let timer;

// STEP 1
async function sendCode() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Digite um email válido");
    return;
  }

  if (TEST_MODE) {
    goToCodeStep(email);
    return;
  }

  await fetch(domain + "/passwordless/start", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      client_id: client_id,
      connection: "email",
      email: email,
      send: "code"
    })
  });

  goToCodeStep(email);
}

function goToCodeStep(email) {
  document.getElementById("step-email").style.display = "none";
  document.getElementById("step-code").style.display = "block";

  document.getElementById("emailText").innerText =
    "Enviamos um código para " + email;

  startCooldown();

  setTimeout(() => {
    focusHiddenInput();
  }, 100);
}

// CODE UI
function focusHiddenInput() {
  const input = document.getElementById("code-hidden");
  input.focus({ preventScroll: true });

  if (!input.value) {
    document.getElementById("box0").classList.add("active");
  }
}

function handleCodeInput() {
  const input = document.getElementById("code-hidden");
  let value = input.value.replace(/\D/g, "").slice(0, 6);

  input.value = value;

  for (let i = 0; i < 6; i++) {
    const box = document.getElementById("box" + i);
    box.innerText = value[i] || "";
    box.classList.remove("active");
  }

  let activeIndex = value.length;
  if (activeIndex > 5) activeIndex = 5;

  document.getElementById("box" + activeIndex).classList.add("active");
}

// RESEND
function startCooldown() {
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;

  countdown = 30;

  timer = setInterval(() => {
    countdown--;
    btn.innerText = "Reenviar código (" + countdown + "s)";

    if (countdown <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.innerText = "Reenviar código";
    }
  }, 1000);
}

document.getElementById("resendBtn").onclick = sendCode;

// VERIFY
async function verifyCode() {
  const email = document.getElementById("email").value;
  const code = document.getElementById("code-hidden").value;

  if (TEST_MODE) {
    if (code === "123456") {
      window.location.href = "https://membros.dozeroafluencia.com/";
    } else {
      document.getElementById("msg").innerText = "Use o código 123456";
    }
    return;
  }

  const res = await fetch(domain + "/oauth/token", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      grant_type: "http://auth0.com/oauth/grant-type/passwordless/otp",
      client_id: client_id,
      username: email,
      otp: code,
      realm: "email"
    })
  });

  const data = await res.json();

  if (data.access_token) {
    window.location.href = "https://membros.dozeroafluencia.com/";
  } else {
    document.getElementById("msg").innerText = "Código inválido!";
  }
}

// GOOGLE
function loginGoogle() {
  if (TEST_MODE) {
    window.location.href = "https://membros.dozeroafluencia.com/";
    return;
  }

  window.location.href =
    domain + "/authorize?response_type=code" +
    "&client_id=" + client_id +
    "&connection=google-oauth2" +
    "&redirect_uri=https://login.dozeroafluencia.com";
}
</script>

</body>
</html>
