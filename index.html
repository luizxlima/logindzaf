<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
}

/* ================= DESKTOP ================= */
.desktop {
  display: flex;
  height: 100vh;
}

.left {
  width: 420px;
  padding: 60px 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #f5f5f5;
}

.content {
  max-width: 320px;
}

.logo {
  width: 60px;
  margin-bottom: 30px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
  font-weight: 700;
}

.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 25px;
}

.label {
  font-size: 13px;
  margin-bottom: 5px;
  display: block;
  font-weight: 500;
}

input[type="email"],
input[type="text"],
input[type="tel"] {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
}

input:focus {
  border-color: #3b5cff;
}

button {
  width: 100%;
  padding: 13px;
  border-radius: 6px;
  border: none;
  margin-top: 12px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: opacity 0.2s;
}

button:hover { opacity: 0.88; }
button:disabled { opacity: 0.5; cursor: not-allowed; }

.primary {
  background: #3b5cff;
  color: white;
}

.google {
  background: white;
  border: 1px solid #ccc !important;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-weight: 500;
  color: #333;
}

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 20px 0;
  color: #aaa;
  font-size: 13px;
}

.divider::before,
.divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: #ddd;
}

.right {
  flex: 1;
  background: url('/bg.png') center/cover no-repeat;
}

/* CODE BOX */
.code-container {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  cursor: text;
  position: relative;
}

.code-box {
  flex: 1;
  height: 52px;
  border: 1px solid #ccc;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
  transition: border-color 0.2s;
}

.code-box.active {
  border-color: #3b5cff;
  box-shadow: 0 0 0 2px rgba(59,92,255,0.15);
}

.code-hidden {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;
  cursor: text;
  font-size: 16px;
}

.back-btn {
  background: none;
  border: none;
  width: auto;
  padding: 0;
  margin-top: 16px;
  font-size: 13px;
  color: #3b5cff;
  cursor: pointer;
  font-weight: 500;
  display: inline-block;
}

.resend-wrap {
  margin-top: 14px;
  font-size: 13px;
  color: #666;
  text-align: center;
}

.resend-btn {
  background: none;
  border: none;
  width: auto;
  padding: 0;
  margin-top: 0;
  font-size: 13px;
  color: #3b5cff;
  cursor: pointer;
  font-weight: 600;
  display: inline;
}

.resend-btn:disabled {
  color: #aaa;
  cursor: not-allowed;
}

.error-msg {
  color: #e03e3e;
  font-size: 13px;
  margin-top: 8px;
  display: none;
}

/* ================= MOBILE ================= */
.mobile {
  display: none;
  min-height: 100vh;
  background: #fff;
}

.mobile .container {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 24px 48px;
}

.mobile .logo-wrap {
  display: flex;
  justify-content: center;
  padding: 52px 0 36px;
}

.mobile .logo {
  width: 72px;
  height: 72px;
  object-fit: contain;
}

.mobile h1 {
  font-size: 28px;
  font-weight: 800;
  margin-bottom: 8px;
  color: #111;
}

.mobile .subtitle {
  color: #666;
  font-size: 15px;
  margin-bottom: 28px;
}

.mobile .label {
  font-size: 14px;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
  display: block;
}

.mobile input[type="email"],
.mobile input[type="text"],
.mobile input[type="tel"] {
  padding: 16px;
  font-size: 16px;
  border-radius: 8px;
}

.mobile button {
  padding: 16px;
  font-size: 16px;
  border-radius: 8px;
  margin-top: 14px;
}

.mobile .google {
  border: 1px solid #ddd !important;
}

.mobile .divider {
  margin: 24px 0;
}

.mobile .code-box {
  height: 58px;
  font-size: 22px;
}

.mobile .back-btn {
  font-size: 14px;
  margin-top: 20px;
}

.mobile .resend-wrap {
  font-size: 14px;
  margin-top: 16px;
}

.mobile .resend-btn {
  font-size: 14px;
}

.mobile .error-msg {
  font-size: 14px;
}

/* ================= RESPONSIVE ================= */
@media (max-width: 900px) {
  .desktop { display: none; }
  .mobile { display: block; }
}
</style>
</head>

<body>

<!-- ===== DESKTOP ===== -->
<div class="desktop">
  <div class="left">
    <div class="content">

      <img src="/logo.png" class="logo" alt="Logo">

      <h1>Entrar</h1>
      <div class="subtitle">Escolha como deseja entrar na sua conta</div>

      <div id="step-email-desktop">
        <label class="label">Email</label>
        <input id="email-desktop" type="email" placeholder="Digite seu email">
        <div class="error-msg" id="error-email-desktop"></div>
        <button class="primary" id="btn-enter-desktop" onclick="sendCode('desktop')">Entrar</button>

        <div class="divider">ou</div>

        <button class="google" onclick="loginGoogle()">
          <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Entrar com Google
        </button>
      </div>

      <div id="step-code-desktop" style="display:none;">
        <p style="font-size:14px; color:#555; margin-bottom:16px;" id="emailText-desktop"></p>

        <label class="label">Código de verificação</label>
        <div class="code-container" onclick="focusInput('desktop')">
          <input class="code-hidden" id="code-desktop" type="tel" maxlength="6" inputmode="numeric" oninput="handleCode('desktop')">
          <div class="code-box active" id="d0"></div>
          <div class="code-box" id="d1"></div>
          <div class="code-box" id="d2"></div>
          <div class="code-box" id="d3"></div>
          <div class="code-box" id="d4"></div>
          <div class="code-box" id="d5"></div>
        </div>
        <div class="error-msg" id="error-code-desktop"></div>

        <button class="primary" id="btn-confirm-desktop" onclick="verifyCode('desktop')">Confirmar</button>

        <div class="resend-wrap">
          <button class="resend-btn" id="resend-desktop" onclick="resendCode('desktop')" disabled>
            Reenviar código (<span id="countdown-desktop">60</span>s)
          </button>
        </div>

        <button class="back-btn" onclick="goBack('desktop')">← Voltar</button>
      </div>

    </div>
  </div>

  <div class="right"></div>
</div>

<!-- ===== MOBILE ===== -->
<div class="mobile">
  <div class="container">

    <div class="logo-wrap">
      <img src="/logo.png" class="logo" alt="Logo">
    </div>

    <div id="step-email-mobile">
      <h1>Entrar</h1>
      <div class="subtitle">Escolha como deseja entrar na sua conta</div>

      <label class="label">Email</label>
      <input id="email-mobile" type="email" placeholder="Digite seu email">
      <div class="error-msg" id="error-email-mobile"></div>

      <button class="primary" id="btn-enter-mobile" onclick="sendCode('mobile')">Entrar</button>

      <div class="divider">ou</div>

      <button class="google" onclick="loginGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Entrar com Google
      </button>
    </div>

    <div id="step-code-mobile" style="display:none;">
      <h1>Verifique seu email</h1>
      <div class="subtitle" id="emailText-mobile" style="margin-top:8px;"></div>

      <label class="label" style="margin-top:28px;">Código de verificação</label>
      <div class="code-container" onclick="focusInput('mobile')">
        <input class="code-hidden" id="code-mobile" type="tel" maxlength="6" inputmode="numeric" oninput="handleCode('mobile')">
        <div class="code-box active" id="m0"></div>
        <div class="code-box" id="m1"></div>
        <div class="code-box" id="m2"></div>
        <div class="code-box" id="m3"></div>
        <div class="code-box" id="m4"></div>
        <div class="code-box" id="m5"></div>
      </div>
      <div class="error-msg" id="error-code-mobile"></div>

      <button class="primary" id="btn-confirm-mobile" onclick="verifyCode('mobile')">Confirmar</button>

      <div class="resend-wrap">
        <button class="resend-btn" id="resend-mobile" onclick="resendCode('mobile')" disabled>
          Reenviar código (<span id="countdown-mobile">60</span>s)
        </button>
      </div>

      <button class="back-btn" onclick="goBack('mobile')">← Voltar</button>
    </div>

  </div>
</div>

<script>
const AUTH0_DOMAIN = "sso.dozeroafluencia.com";
const AUTH0_CLIENT_ID = "2qjWADjQ2sCid8z9QY2oM1QgUvX3nBz6";
const CANVAS_URL = "https://membros.dozeroafluencia.com/";
const REDIRECT_URI = "https://membros.dozeroafluencia.com/login/oauth2/callback";

let currentEmail = "";
let countdownTimer = null;

// =============================================
// GOOGLE LOGIN
// =============================================
function loginGoogle() {
  const state = Math.random().toString(36).substring(2, 15);

  const params = new URLSearchParams({
    response_type: "code",
    client_id: AUTH0_CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    scope: "openid email profile",
    connection: "google-oauth2",
    state: state,
    prompt: "login"
  });

  window.location.href = `https://${AUTH0_DOMAIN}/authorize?${params}`;
}

// =============================================
// SEND CODE
// =============================================
async function sendCode(type) {
  const email = document.getElementById(`email-${type}`).value.trim();
  const errorEl = document.getElementById(`error-email-${type}`);
  const btn = document.getElementById(`btn-enter-${type}`);

  errorEl.style.display = "none";

  if (!email || !email.includes("@")) {
    errorEl.innerText = "Digite um email válido.";
    errorEl.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Enviando...";

  try {
    const res = await fetch("/api/send-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await res.json();

    if (res.ok) {
      currentEmail = email;
      document.getElementById(`step-email-${type}`).style.display = "none";
      document.getElementById(`step-code-${type}`).style.display = "block";
      document.getElementById(`emailText-${type}`).innerText =
        "Enviamos um código para " + email + ". Verifique sua caixa de entrada.";
      startCountdown(type);
      setTimeout(() => focusInput(type), 150);
    } else {
      errorEl.innerText = data.error || "Erro ao enviar código. Tente novamente.";
      errorEl.style.display = "block";
    }
  } catch (e) {
    errorEl.innerText = "Erro de conexão. Tente novamente.";
    errorEl.style.display = "block";
  }

  btn.disabled = false;
  btn.innerText = "Entrar";
}

// =============================================
// RESEND CODE
// =============================================
async function resendCode(type) {
  const btn = document.getElementById(`resend-${type}`);
  btn.disabled = true;

  try {
    await fetch("/api/send-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: currentEmail })
    });
  } catch (e) {}

  const prefix = type === "mobile" ? "m" : "d";
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(prefix + i);
    box.innerText = "";
    box.classList.remove("active");
  }
  document.getElementById(prefix + "0").classList.add("active");
  document.getElementById(`code-${type}`).value = "";
  document.getElementById(`error-code-${type}`).style.display = "none";

  startCountdown(type);
}

// =============================================
// COUNTDOWN 60s
// =============================================
function startCountdown(type) {
  const btn = document.getElementById(`resend-${type}`);
  let seconds = 60;

  btn.disabled = true;
  btn.innerHTML = `Reenviar código (<span id="countdown-${type}">${seconds}</span>s)`;

  if (countdownTimer) clearInterval(countdownTimer);

  countdownTimer = setInterval(() => {
    seconds--;
    const el = document.getElementById(`countdown-${type}`);
    if (el) el.innerText = seconds;
    if (seconds <= 0) {
      clearInterval(countdownTimer);
      btn.disabled = false;
      btn.innerHTML = "Reenviar código";
    }
  }, 1000);
}

// =============================================
// VERIFY CODE — valida OTP no backend e
// redireciona direto para o Canvas.
// O Canvas vai ao SSO, Auth0 já tem sessão
// válida e completa o login sem pedir nada.
// =============================================
async function verifyCode(type) {
  const code = document.getElementById(`code-${type}`).value;
  const errorEl = document.getElementById(`error-code-${type}`);
  const btn = document.getElementById(`btn-confirm-${type}`);

  errorEl.style.display = "none";

  if (code.length < 6) {
    errorEl.innerText = "Digite os 6 dígitos do código.";
    errorEl.style.display = "block";
    return;
  }

  btn.disabled = true;
  btn.innerText = "Verificando...";

  try {
    const res = await fetch("/api/verify-code", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email: currentEmail, code })
    });

    const data = await res.json();

    if (res.ok && data.success) {
      // OTP válido — vai direto pro Canvas
      // Auth0 já tem sessão criada, Canvas completa o login automaticamente
    const params = new URLSearchParams({
      response_type: "code",
      client_id: AUTH0_CLIENT_ID,
      redirect_uri: REDIRECT_URI,
      scope: "openid email profile",
      login_hint: currentEmail
   });

window.location.href = `https://${AUTH0_DOMAIN}/authorize?${params}`;
    } else {
      errorEl.innerText = data.error || "Código inválido ou expirado.";
      errorEl.style.display = "block";
      btn.disabled = false;
      btn.innerText = "Confirmar";
    }
  } catch (e) {
    errorEl.innerText = "Erro de conexão. Tente novamente.";
    errorEl.style.display = "block";
    btn.disabled = false;
    btn.innerText = "Confirmar";
  }
}

// =============================================
// UI HELPERS
// =============================================
function focusInput(type) {
  document.getElementById(`code-${type}`).focus();
}

function handleCode(type) {
  const input = document.getElementById(`code-${type}`);
  let value = input.value.replace(/\D/g, "").slice(0, 6);
  input.value = value;

  const prefix = type === "mobile" ? "m" : "d";
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(prefix + i);
    box.innerText = value[i] || "";
    box.classList.remove("active");
  }

  if (value.length < 6) {
    document.getElementById(prefix + value.length).classList.add("active");
  }

  if (value.length === 6) verifyCode(type);
}

function goBack(type) {
  if (countdownTimer) clearInterval(countdownTimer);

  document.getElementById(`step-code-${type}`).style.display = "none";
  document.getElementById(`step-email-${type}`).style.display = "block";

  const prefix = type === "mobile" ? "m" : "d";
  for (let i = 0; i < 6; i++) {
    const box = document.getElementById(prefix + i);
    box.innerText = "";
    box.classList.remove("active");
  }
  document.getElementById(prefix + "0").classList.add("active");
  document.getElementById(`code-${type}`).value = "";
  document.getElementById(`error-code-${type}`).style.display = "none";

  const resendBtn = document.getElementById(`resend-${type}`);
  resendBtn.disabled = true;
  resendBtn.innerHTML = `Reenviar código (<span id="countdown-${type}">60</span>s)`;
}
</script>

</body>
</html>
