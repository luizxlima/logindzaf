<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
}

/* LEFT PANEL */
.left {
  width: 420px;
  padding: 60px 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #f5f5f5;
}

/* TOP CONTENT */
.content {
  width: 100%;
}

.logo {
  width: 60px;
  margin-bottom: 30px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 25px;
}

/* LABEL */
.label {
  font-size: 13px;
  margin-bottom: 5px;
  display: block;
}

/* INPUT */
input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  margin-top: 12px;
  font-size: 14px;
  cursor: pointer;
}

/* PRIMARY */
.primary {
  background: #3b5cff;
  color: white;
  font-weight: 600;
}

/* GOOGLE */
.google {
  background: white;
  border: 1px solid #ccc;
}

/* DIVIDER */
.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  color: #999;
  font-size: 13px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #ddd;
}

.divider span {
  margin: 0 10px;
}

/* CODE */
.code-container {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  cursor: text;
}

.code-box {
  width: 42px;
  height: 52px;
  border: 1px solid #ccc;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
  background: #fff;
}

.code-box.active {
  border-color: #3b5cff;
  box-shadow: 0 0 0 2px rgba(59,92,255,0.2);
}

#code-hidden {
  position: absolute;
  opacity: 0;
}

/* FOOTER */
.footer {
  font-size: 12px;
  color: #777;
}

.footer a {
  color: #3b5cff;
  text-decoration: none;
}

.footer .signup {
  margin-bottom: 20px;
}

.footer .powered {
  margin-bottom: 10px;
}

/* RIGHT IMAGE */
.right {
  flex: 1;
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('/bg.png') center/cover no-repeat;
}

/* MOBILE */
@media (max-width: 900px) {
  body {
    flex-direction: column;
    background: #f5f5f5;
  }

  .right {
    display: none;
  }

  .left {
    width: 100%;
    height: 100%;
    padding: 30px 20px;
    justify-content: center;
  }

  .footer {
    display: none;
  }
}
</style>
</head>

<body>

<div class="left">

  <div class="content">
    <img src="/logo.png" class="logo">

    <h1>Conecte-se</h1>
    <div class="subtitle">Escolha como deseja acessar sua conta.</div>

    <!-- STEP EMAIL -->
    <div id="step-email">
      <label class="label">E-mail</label>
      <input type="email" id="email" placeholder="Insira seu endereço de e-mail">

      <button class="primary" onclick="sendCode()">Conecte-se</button>

      <div class="divider"><span>ou</span></div>

      <button class="google" onclick="loginGoogle()">Entrar com o Google</button>
    </div>

    <!-- STEP CODE -->
    <div id="step-code" style="display:none;">
      <p id="emailText"></p>

      <label class="label">Código</label>

      <div class="code-container" onclick="focusHiddenInput()">
        <input id="code-hidden" maxlength="6" oninput="handleCodeInput()">
        <div class="code-box" id="box0"></div>
        <div class="code-box" id="box1"></div>
        <div class="code-box" id="box2"></div>
        <div class="code-box" id="box3"></div>
        <div class="code-box" id="box4"></div>
        <div class="code-box" id="box5"></div>
      </div>

      <button class="primary" onclick="verifyCode()">Confirmar</button>
      <button id="resendBtn" disabled>Reenviar código (30s)</button>

      <div class="divider"><span>ou</span></div>

      <button class="google">Faça login com a senha</button>
    </div>

    <p id="msg"></p>
  </div>

  <!-- FOOTER -->
  <div class="footer">
    <div class="signup">
      Não tem uma conta? <a href="#">Inscrever-se</a>
    </div>

    <div class="powered">
      Distribuído por <strong>hotmart</strong>
    </div>

    <div>
      Apoiar — Termos de Uso — política de Privacidade
    </div>
  </div>

</div>

<div class="right"></div>

<script>
const domain = "https://sso.dozeroafluencia.com";
const client_id = "2qjWADjQ2sCid8z9QY2oM1QgUvX3nBz6";

const TEST_MODE = true;

let countdown = 30;
let timer;

async function sendCode() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Digite um email válido");
    return;
  }

  if (TEST_MODE) {
    goToCodeStep(email);
    return;
  }

  await fetch(domain + "/passwordless/start", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      client_id,
      connection: "email",
      email,
      send: "code"
    })
  });

  goToCodeStep(email);
}

function goToCodeStep(email) {
  document.getElementById("step-email").style.display = "none";
  document.getElementById("step-code").style.display = "block";

  document.getElementById("emailText").innerText =
    "Acesse sua caixa de entrada de e-mail em " + email + " e copie o código.";

  startCooldown();

  setTimeout(() => focusHiddenInput(), 100);
}

function focusHiddenInput() {
  document.getElementById("code-hidden").focus({ preventScroll: true });
}

function handleCodeInput() {
  const input = document.getElementById("code-hidden");
  let value = input.value.replace(/\D/g, "").slice(0, 6);

  input.value = value;

  for (let i = 0; i < 6; i++) {
    const box = document.getElementById("box" + i);
    box.innerText = value[i] || "";
    box.classList.remove("active");
  }

  document.getElementById("box" + value.length)?.classList.add("active");
}

function startCooldown() {
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;

  countdown = 30;

  timer = setInterval(() => {
    countdown--;
    btn.innerText = "Reenviar código (" + countdown + "s)";

    if (countdown <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.innerText = "Reenviar código";
    }
  }, 1000);
}

document.getElementById("resendBtn").onclick = sendCode;

async function verifyCode() {
  const email = document.getElementById("email").value;
  const code = document.getElementById("code-hidden").value;

  if (TEST_MODE) {
    if (code === "123456") {
      window.location.href = "https://membros.dozeroafluencia.com/";
    } else {
      document.getElementById("msg").innerText = "Use o código 123456";
    }
    return;
  }

  const res = await fetch(domain + "/oauth/token", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      grant_type: "http://auth0.com/oauth/grant-type/passwordless/otp",
      client_id,
      username: email,
      otp: code,
      realm: "email"
    })
  });

  const data = await res.json();

  if (data.access_token) {
    window.location.href = "https://membros.dozeroafluencia.com/";
  } else {
    document.getElementById("msg").innerText = "Código inválido!";
  }
}

function loginGoogle() {
  if (TEST_MODE) {
    window.location.href = "https://membros.dozeroafluencia.com/";
    return;
  }

  window.location.href =
    domain + "/authorize?response_type=code" +
    "&client_id=" + client_id +
    "&connection=google-oauth2" +
    "&redirect_uri=https://login.dozeroafluencia.com";
}
</script>

</body>
</html>
