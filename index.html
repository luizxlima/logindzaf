<!DOCTYPE html>

<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  display: flex;
  height: 100vh;
}

/* LADO ESQUERDO */
.left {
  width: 400px;
  padding: 40px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: white;
}

.logo {
  width: 60px;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}

.primary {
  background: #3b5cff;
  color: white;
  font-weight: bold;
}

.google {
  background: white;
  border: 1px solid #ccc;
}

.divider {
  text-align: center;
  margin: 15px 0;
}

/* BACKGROUND */
.right {
  flex: 1;
  background: 
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('/bg.png') center center / cover no-repeat;
}

/* MOBILE */
@media (max-width: 900px) {
  body {
    flex-direction: column;
    background: #f5f5f5;
  }

  .right {
    display: none;
  }

  .left {
    width: 100%;
    height: 100%;
    background: transparent;
    padding: 30px 20px;
  }

  .logo {
    margin: 0 auto 20px auto;
    display: block;
  }

  h2, p {
    text-align: center;
  }
}
</style>

</head>

<body>

<div class="left">
  <img class="logo" src="/logo.png" />

  <h2>Entrar</h2>

  <!-- STEP 1 -->

  <div id="step-email">
    <input type="email" id="email" placeholder="Digite seu email" />
    <button class="primary" onclick="sendCode()">Continuar</button>

```
<div class="divider">ou</div>
<button class="google" onclick="loginGoogle()">Entrar com Google</button>
```

  </div>

  <!-- STEP 2 -->

  <div id="step-code" style="display:none;">
    <p id="emailText"></p>

```
<input type="text" id="code" placeholder="Digite o código" />
<button class="primary" onclick="verifyCode()">Confirmar</button>

<button id="resendBtn" disabled>Reenviar código (30s)</button>
```

  </div>

  <p id="msg"></p>
</div>

<div class="right"></div>

<script>
const domain = "https://sso.dozeroafluencia.com";
const client_id = "2qjWADjQ2sCid8z9QY2oM1QgUvX3nBz6";

let countdown = 30;
let timer;

async function sendCode() {
  const email = document.getElementById("email").value;

  if (!email) {
    alert("Digite um email válido");
    return;
  }

  await fetch(domain + "/passwordless/start", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      client_id: client_id,
      connection: "email",
      email: email,
      send: "code"
    })
  });

  document.getElementById("step-email").style.display = "none";
  document.getElementById("step-code").style.display = "block";

  document.getElementById("emailText").innerText =
    "Enviamos um código para " + email;

  startCooldown();
}

function startCooldown() {
  const btn = document.getElementById("resendBtn");
  btn.disabled = true;

  countdown = 30;

  timer = setInterval(() => {
    countdown--;
    btn.innerText = "Reenviar código (" + countdown + "s)";

    if (countdown <= 0) {
      clearInterval(timer);
      btn.disabled = false;
      btn.innerText = "Reenviar código";
    }
  }, 1000);
}

document.getElementById("resendBtn").onclick = sendCode;

async function verifyCode() {
  const email = document.getElementById("email").value;
  const code = document.getElementById("code").value;

  const res = await fetch(domain + "/oauth/token", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      grant_type: "http://auth0.com/oauth/grant-type/passwordless/otp",
      client_id: client_id,
      username: email,
      otp: code,
      realm: "email"
    })
  });

  const data = await res.json();

  if (data.access_token) {
    window.location.href = "https://membros.dozeroafluencia.com/";
  } else {
    document.getElementById("msg").innerText = "Código inválido!";
  }
}

function loginGoogle() {
  window.location.href =
    domain + "/authorize?response_type=code" +
    "&client_id=" + client_id +
    "&connection=google-oauth2" +
    "&redirect_uri=https://login.dozeroafluencia.com";
}
</script>

</body>
</html>
