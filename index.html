<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  display: flex;
  height: 100vh;
}

/* LEFT (DESKTOP) */
.left {
  width: 420px;
  padding: 60px 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  background: #f5f5f5;
}

.content {
  width: 100%;
  max-width: 320px;
}

.logo {
  width: 60px;
  margin-bottom: 30px;
}

h1 {
  font-size: 28px;
  margin-bottom: 10px;
}

.subtitle {
  color: #666;
  font-size: 14px;
  margin-bottom: 25px;
}

.label {
  font-size: 13px;
  margin-bottom: 5px;
  display: block;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 6px;
  border: none;
  margin-top: 12px;
  font-size: 14px;
  cursor: pointer;
}

.primary {
  background: #3b5cff;
  color: white;
  font-weight: 600;
}

.google {
  background: white;
  border: 1px solid #ccc;
}

.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  color: #999;
  font-size: 13px;
}

.divider::before,
.divider::after {
  content: "";
  flex: 1;
  height: 1px;
  background: #ddd;
}

.divider span { margin: 0 10px; }

/* CODE */
.code-container {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  cursor: text;
}

.code-box {
  width: 42px;
  height: 52px;
  border: 1px solid #ccc;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: bold;
}

.code-box.active {
  border-color: #3b5cff;
  box-shadow: 0 0 0 2px rgba(59,92,255,0.2);
}

#code-hidden {
  position: absolute;
  left: 0;
  top: 0;
  width: 1px;
  height: 1px;
  opacity: 0;
}

/* FOOTER */
.footer {
  font-size: 12px;
  color: #777;
}

/* RIGHT */
.right {
  flex: 1;
  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)),
    url('/bg.png') center/cover no-repeat;
}

/* 🔥 MOBILE REAL (IGUAL HOTMART) */
@media (max-width: 900px) {
  body {
    display: block;
    height: auto;
    background: #f5f5f5;
  }

  .right {
    display: none;
  }

  .left {
    width: 100%;
    height: auto;
    padding: 40px 20px;
    background: #f5f5f5;

    /* 🔥 REMOVE comportamento de sidebar */
    display: block;
  }

  .content {
    max-width: 400px;
    margin: 0 auto;
  }

  .logo {
    display: block;
    margin: 40px auto 20px auto;
    width: 70px;
  }

  h1 {
    font-size: 26px;
    margin-top: 10px;
  }

  .subtitle {
    margin-bottom: 20px;
  }

  input {
    padding: 16px;
    font-size: 16px;
  }

  button {
    padding: 16px;
    font-size: 16px;
  }

  .footer {
    text-align: center;
    margin-top: 30px;
    display: block;
  }
}
</style>
</head>

<body>

<div class="left">
  <div class="content">

    <img src="/logo.png" class="logo">

    <h1>Entrar</h1>
    <div class="subtitle">Escolha como deseja entrar na sua conta</div>

    <!-- STEP EMAIL -->
    <div id="step-email">
      <label class="label">Email</label>
      <input type="email" id="email" placeholder="Digite seu email">

      <button class="primary" onclick="sendCode()">Entrar</button>

      <div class="divider"><span>ou</span></div>

      <button class="google" onclick="loginGoogle()">Entrar com Google</button>
    </div>

    <!-- STEP CODE -->
    <div id="step-code" style="display:none;">
      <p id="emailText"></p>

      <label class="label">Código</label>

      <div class="code-container" onclick="focusHiddenInput()">
        <input id="code-hidden" maxlength="6" oninput="handleCodeInput()">
        <div class="code-box" id="box0"></div>
        <div class="code-box" id="box1"></div>
        <div class="code-box" id="box2"></div>
        <div class="code-box" id="box3"></div>
        <div class="code-box" id="box4"></div>
        <div class="code-box" id="box5"></div>
      </div>

      <button class="primary" onclick="verifyCode()">Confirmar</button>
      <button id="resendBtn" disabled>Reenviar código (30s)</button>
    </div>

    <p id="msg"></p>
  </div>

  <div class="footer">
    Distribuído por hotmart
  </div>
</div>

<div class="right"></div>

<script>
// (seu JS igual — mantido)
</script>

</body>
</html>
